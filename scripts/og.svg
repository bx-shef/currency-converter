<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3a65ff"/>
      <stop offset="100%" stop-color="#1a3fc4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="80" cy="80" r="220" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1120" cy="550" r="200" fill="rgba(255,255,255,0.05)"/>

  <!-- Main title -->
  <text x="600" y="248"
    text-anchor="middle"
    font-family="DejaVu Sans, sans-serif"
    font-size="84"
    font-weight="bold"
    fill="white">&#x41A;&#x43E;&#x43D;&#x432;&#x435;&#x440;&#x442;&#x435;&#x440; &#x432;&#x430;&#x43B;&#x44E;&#x442;</text>

  <!-- Subtitle -->
  <text x="600" y="334"
    text-anchor="middle"
    font-family="DejaVu Sans, sans-serif"
    font-size="40"
    fill="rgba(255,255,255,0.78)">Простые решения от AI-ассистента</text>

  <!-- Separator -->
  <line x1="340" y1="382" x2="860" y2="382" stroke="rgba(255,255,255,0.28)" stroke-width="1"/>

  <!-- Currency badges: 7 × 130px + 6 × 15px gap = 1000px; start x = 100. BYN (base) highlighted. -->
  <rect x="100" y="415" width="130" height="66" rx="12" fill="rgba(255,255,255,0.20)"/>
  <text x="165" y="460" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="34" font-weight="bold" fill="white">USD</text>

  <rect x="245" y="415" width="130" height="66" rx="12" fill="rgba(255,255,255,0.20)"/>
  <text x="310" y="460" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="34" font-weight="bold" fill="white">EUR</text>

  <rect x="390" y="415" width="130" height="66" rx="12" fill="rgba(255,255,255,0.20)"/>
  <text x="455" y="460" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="34" font-weight="bold" fill="white">RUB</text>

  <rect x="535" y="415" width="130" height="66" rx="12" fill="rgba(255,255,255,0.28)"/>
  <text x="600" y="460" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="34" font-weight="bold" fill="white">BYN</text>

  <rect x="680" y="415" width="130" height="66" rx="12" fill="rgba(255,255,255,0.20)"/>
  <text x="745" y="460" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="34" font-weight="bold" fill="white">KZT</text>

  <rect x="825" y="415" width="130" height="66" rx="12" fill="rgba(255,255,255,0.20)"/>
  <text x="890" y="460" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="34" font-weight="bold" fill="white">CNY</text>

  <rect x="970" y="415" width="130" height="66" rx="12" fill="rgba(255,255,255,0.20)"/>
  <text x="1035" y="460" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="34" font-weight="bold" fill="white">TRY</text>
</svg>
