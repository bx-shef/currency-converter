# Reverse-proxy с автоматическим TLS (Let's Encrypt)
# Запустить один раз: make init-nginxproxy
# Обслуживает все сайты на этом сервере.
#
# ВАЖНО: docker.sock у acme-companion смонтирован read-write (acme-companion
# делает `docker exec` на nginx-proxy чтобы перечитать конфиг). Это известный
# архитектурный риск upstream-проекта; mitigation — пин image-тегов и сетевая
# изоляция. nginx-proxy сам читает сокет read-only.

services:
  nginx-proxy:
    # Pinned (not floating `:alpine`/`latest`) so `docker compose pull` can't drag in
    # a breaking change unattended. Bump deliberately; verify the tag exists first.
    image: nginxproxy/nginx-proxy:1.7-alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - nginx-certs:/etc/nginx/certs
      - nginx-vhost:/etc/nginx/vhost.d
      - nginx-html:/usr/share/nginx/html
    restart: unless-stopped
    networks:
      - proxy-net

  acme-companion:
    # Pinned (not floating `latest`); bump deliberately, verify the tag exists first.
    image: nginxproxy/acme-companion:2.5
    container_name: acme-companion
    volumes_from:
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - nginx-acme:/etc/acme.sh
    environment:
      DEFAULT_EMAIL: ${LETSENCRYPT_EMAIL}
    depends_on:
      - nginx-proxy
    restart: unless-stopped
    networks:
      - proxy-net

volumes:
  nginx-certs:
  nginx-vhost:
  nginx-html:
  nginx-acme:

networks:
  proxy-net:
    external: true
