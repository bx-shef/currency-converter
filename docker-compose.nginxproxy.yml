# Reverse-proxy с автоматическим TLS (Let's Encrypt)
# Запустить один раз: make init-nginxproxy
# Обслуживает все сайты на этом сервере

services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - nginx-certs:/etc/nginx/certs
      - nginx-vhost:/etc/nginx/vhost.d
      - nginx-html:/usr/share/nginx/html
    restart: unless-stopped
    networks:
      - proxy

  acme-companion:
    image: nginxproxy/acme-companion
    volumes_from:
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nginx-acme:/etc/acme.sh
    environment:
      DEFAULT_EMAIL: ${LETSENCRYPT_EMAIL}
    depends_on:
      - nginx-proxy
    restart: unless-stopped
    networks:
      - proxy

volumes:
  nginx-certs:
  nginx-vhost:
  nginx-html:
  nginx-acme:

networks:
  proxy:
    name: nginx-proxy
