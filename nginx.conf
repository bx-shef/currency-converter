server {
    listen 80;
    server_name _;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed Nuxt assets — immutable, long cache.
    location /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # HSTS: TLS terminates at the external nginx-proxy; force HTTPS for 1y including subdomains.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # unsafe-inline required for Яндекс.Метрика inline script
    # Note: if adding location blocks with their own add_header, repeat security headers (nginx does not inherit)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' mc.yandex.ru; style-src 'self' 'unsafe-inline'; img-src 'self' mc.yandex.ru data:; connect-src 'self' api.nbrb.by mc.yandex.ru; font-src 'self'; frame-ancestors 'none'; base-uri 'self';" always;
}
