server {
    # Port 8080: the image runs as the unprivileged `nginx` user (see Dockerfile),
    # which cannot bind to ports below 1024. The external nginx-proxy maps to it.
    listen 8080;
    server_name _;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed Nuxt assets — immutable, long cache.
    location /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=(), serial=(), interest-cohort=()" always;
    # Framing is denied; X-Frame-Options DENY mirrors `frame-ancestors 'none'` for old browsers.
    add_header X-Frame-Options "DENY" always;
    # HSTS: TLS terminates at the external nginx-proxy; force HTTPS for 1y including subdomains.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP without `script-src 'unsafe-inline'`: the two inline scripts Nuxt emits in
    # index.html (the FOUC theme-init guard and `window.__NUXT__.config`, whose hash
    # changes per build via buildId) are allow-listed by sha256 hashes injected at
    # build time by scripts/csp-hashes.mjs (replaces the __CSP_SCRIPT_HASHES__ token).
    # Яндекс.Метрика is loaded from a static /metrika.js, so no inline script remains.
    # style-src keeps 'unsafe-inline' — Vue/b24ui emit inline style attributes.
    # Note: if adding location blocks with their own add_header, repeat security headers (nginx does not inherit).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' __CSP_SCRIPT_HASHES__ mc.yandex.ru; style-src 'self' 'unsafe-inline'; img-src 'self' mc.yandex.ru data:; connect-src 'self' api.nbrb.by mc.yandex.ru; font-src 'self'; frame-ancestors 'none'; base-uri 'self';" always;
}
