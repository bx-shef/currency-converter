# Продакшн — разместить на сервере в /home/bitrix/currency-converter/
# Требует: docker network proxy-net (создаётся nginx-proxy setup)

services:
  app:
    # APP_TAG lets `make prod-rollback TAG=sha-xxxx` pin a previous image;
    # unset → latest (normal Watchtower-driven deploy).
    image: ghcr.io/bx-shef/currency-converter:${APP_TAG:-latest}
    container_name: currency-converter
    expose:
      - "80"
    environment:
      VIRTUAL_HOST: ${DOMAIN}
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: ${DOMAIN}
    restart: unless-stopped
    networks:
      - proxy-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      # So compose/Watchtower can tell whether the container actually serves
      # traffic after an update (issue #52 P2). "/" always exists, even on an
      # older rollback image that predates /version.json.
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  watchtower:
    # Pinned tag: floating `latest` would let a compromised upstream image
    # self-upgrade via the docker.sock mount and root the host.
    image: containrrr/watchtower:1.7.1
    container_name: watchtower
    environment:
      - DOCKER_API_VERSION=1.47
    volumes:
      # docker.sock is intentionally read-write — Watchtower has to stop/start
      # containers to update them. Mitigation: image pinned above; only
      # containers carrying the label below are touched (--label-enable).
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup --label-enable
    restart: unless-stopped

networks:
  proxy-net:
    external: true
