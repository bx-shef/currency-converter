# Продакшн — разместить на сервере в /home/bitrix/currency-converter/
# Требует: docker network proxy-net (создаётся nginx-proxy setup)

services:
  app:
    # Обычно `latest` (Watchtower авто-обновляет). Для отката задать конкретный
    # immutable-тег: `make prod-rollback TAG=sha-<коммит>` (issue #52 P1).
    image: ghcr.io/bx-shef/currency-converter:${APP_IMAGE_TAG:-latest}
    container_name: currency-converter
    # 8080: the image runs nginx unprivileged (non-root) on 8080.
    expose:
      - "8080"
    environment:
      VIRTUAL_HOST: ${DOMAIN}
      VIRTUAL_PORT: 8080
      LETSENCRYPT_HOST: ${DOMAIN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - proxy-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    # Cap nginx access logs so json-file doesn't fill the disk over time.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  watchtower:
    # Pinned tag: floating `latest` would let a compromised upstream image
    # self-upgrade via the docker.sock mount and root the host.
    image: containrrr/watchtower:1.7.1
    container_name: watchtower
    environment:
      - DOCKER_API_VERSION=1.47
    volumes:
      # docker.sock is intentionally read-write — Watchtower has to stop/start
      # containers to update them. Mitigation: image pinned above; only
      # containers carrying the label below are touched (--label-enable).
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup --label-enable
    restart: unless-stopped

networks:
  proxy-net:
    external: true
