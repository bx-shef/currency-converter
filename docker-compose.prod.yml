# Продакшн — разместить на сервере в /home/bitrix/currency-converter/
# Требует: docker network proxy-net (создаётся nginx-proxy setup)

services:
  app:
    image: ghcr.io/bx-shef/currency-converter:latest
    container_name: currency-converter
    expose:
      - "80"
    environment:
      VIRTUAL_HOST: ${DOMAIN}
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: ${DOMAIN}
    restart: unless-stopped
    networks:
      - proxy-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup --label-enable
    restart: unless-stopped

networks:
  proxy-net:
    external: true
