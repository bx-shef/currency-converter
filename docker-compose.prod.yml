# Продакшн — разместить на сервере в /home/bitrix/currency-converter/
# Требует: docker network nginx-proxy (make init-network)

services:
  app:
    image: ghcr.io/bx-shef/currency-converter:latest
    expose:
      - "80"
    environment:
      VIRTUAL_HOST: ${DOMAIN}
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: ${DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    restart: unless-stopped
    networks:
      - proxy
      - default
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # /root/.docker/config.json not needed — GHCR image is public (repo is public)
    command: --interval 300 --cleanup --label-enable
    restart: unless-stopped

networks:
  proxy:
    external: true
    name: nginx-proxy
