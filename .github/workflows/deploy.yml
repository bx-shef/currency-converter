name: Deploy

# Triggers on version tags: git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - 'v*'

# Required secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME        — Docker Hub username
#   DOCKERHUB_TOKEN           — Docker Hub access token (not password)
#   NUXT_PUBLIC_YANDEX_COUNTER_ID — ИD счётчика Яндекс.Метрики (необязательно)

jobs:
  deploy:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/currency-converter
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NUXT_PUBLIC_YANDEX_COUNTER_ID=${{ secrets.NUXT_PUBLIC_YANDEX_COUNTER_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
