name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        # Version is read from "packageManager" field in package.json

      - uses: actions/setup-node@v6
        with:
          # Node 22 LTS — eslint-flat-config-utils uses Object.groupBy (Node 21+)
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Prepare Nuxt
        run: pnpm exec nuxi prepare
        # Generates .nuxt/eslint.config.mjs and .nuxt/tsconfig.json that
        # downstream lint/test/typecheck steps depend on.

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Type check
        run: pnpm typecheck

      - name: Build (nuxt generate)
        run: pnpm generate
