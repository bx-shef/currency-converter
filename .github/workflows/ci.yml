name: CI/CD

# Single pipeline so the deploy is gated on a green CI (issue #45 P1):
#   PR  → ci + docker-build (validate, no registry push)
#   main → ci → deploy (build + push to GHCR; Watchtower picks it up ~5 min)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Third-party actions are pinned to a full commit SHA (issue #52, supply-chain
# hardening): a mutable tag (`@v7`) could be re-pointed at malicious code. The
# trailing `# vX.Y.Z` lets Dependabot (github-actions ecosystem, .github/
# dependabot.yml) bump the SHA and the comment together.
jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    # 20m: the `nuxt` Vitest project boots a Nuxt runtime on top of lint/typecheck/generate.
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        # Version is read from "packageManager" field in package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Node 22 LTS — eslint-flat-config-utils uses Object.groupBy (Node 21+)
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Prepare Nuxt
        run: pnpm exec nuxi prepare
        # Generates .nuxt/eslint.config.mjs and .nuxt/tsconfig.json that
        # downstream lint/test/typecheck steps depend on.

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Type check
        run: pnpm typecheck

      - name: Build (nuxt generate)
        run: pnpm generate

  docker-build:
    name: docker-build
    # Validate the production image builds on every PR. Catches Dockerfile /
    # base-image breakage (e.g. corepack removed in node 25+, see deploy guide
    # грабля #17) before it can reach main and the GHCR deploy. No registry push.
    # Runs on Dependabot PRs too — that is exactly where a node bump would surface.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: false
          # The analytics counter is irrelevant to a build smoke-test and
          # omitting the secret keeps this job working on Dependabot PRs.
          cache-from: type=gha

  deploy:
    name: Build & Push to GHCR
    needs: ci
    # Gate the deploy on CI (issue #45 P1): a red CI now blocks the image from
    # ever reaching GHCR / Watchtower. Only the main branch deploys.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      packages: write  # required to push to ghcr.io

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # built-in, no extra secret needed

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NUXT_PUBLIC_YANDEX_COUNTER_ID=${{ secrets.NUXT_PUBLIC_YANDEX_COUNTER_ID }}
            NUXT_PUBLIC_SITE_URL=${{ vars.NUXT_PUBLIC_SITE_URL }}
            NUXT_PUBLIC_AUTHOR_NAME=${{ vars.NUXT_PUBLIC_AUTHOR_NAME }}
            NUXT_PUBLIC_AUTHOR_URL=${{ vars.NUXT_PUBLIC_AUTHOR_URL }}
            NUXT_PUBLIC_COMMIT_SHA=${{ github.sha }}
            NUXT_PUBLIC_MARKETPLACE_URL=${{ vars.NUXT_PUBLIC_MARKETPLACE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
