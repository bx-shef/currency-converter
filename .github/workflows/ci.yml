name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Version is read from "packageManager" field in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build (nuxt generate)
        run: pnpm generate

      - name: Type check
        run: pnpm typecheck
        # Requires .nuxt/tsconfig.json generated in previous step
