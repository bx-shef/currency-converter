name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        # Version is read from "packageManager" field in package.json

      - uses: actions/setup-node@v5
        with:
          # Node 22 LTS — eslint-flat-config-utils uses Object.groupBy (Node 21+)
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Prepare Nuxt
        run: pnpm exec nuxi prepare
        # Generates .nuxt/eslint.config.mjs and .nuxt/tsconfig.json that
        # downstream lint/test/typecheck steps depend on.

      - name: Lint
        run: |
          set +e
          pnpm lint > /tmp/lint.out 2>&1
          code=$?
          if [ $code -ne 0 ]; then
            echo "::group::lint output"
            cat /tmp/lint.out
            echo "::endgroup::"
            while IFS= read -r line; do
              echo "::error::$line"
            done < <(head -40 /tmp/lint.out)
          fi
          exit $code

      - name: Unit tests
        run: pnpm test

      - name: Build (nuxt generate)
        run: pnpm generate

      - name: Type check
        run: pnpm typecheck
